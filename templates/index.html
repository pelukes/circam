<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brno (ne)viditelné | CzechGlobe</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --hover-color: #004494;
            --success-color: #28a745;
            --success-hover: #218838;
            --bg-overlay: rgba(255, 255, 255, 0.93); /* Mírně průhlednější pro spektrum */
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            color: #333;
            /* Spektrální přechod na pozadí: Fialová -> Modrá -> Zelená -> Žlutá -> Červená */
            background: linear-gradient(135deg, #4b0082, #0000ff, #00ff00, #ffff00, #ff0000);
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 30px;
            background: var(--bg-overlay);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            text-align: center;
            flex: 1;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }

        .header-logos {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header img {
            height: 55px;
            object-fit: contain;
        }

        /* OPRAVA: Odstraněn modrý kontejner, logo je přímo v záhlaví */
        .logo-white-inline {
            background: transparent; 
            padding: 0;
            border-radius: 0;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: #222;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: right;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
            margin-top: 20px; 
        }

        .card { 
            background: white; 
            padding: 18px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            transition: transform 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-top: 0;
            font-size: 17px;
            color: #444;
            margin-bottom: 10px;
        }

        .filter-note {
            font-size: 0.8em; 
            color: #d9534f; 
            font-weight: bold;
            margin-bottom: 10px;
        }

        img.preview { 
            width: 100%; 
            height: auto; 
            background: #f8f9fa; 
            min-height: 150px; 
            border: 1px solid #dee2e6; 
            border-radius: 4px;
            margin-top: 15px;
            object-fit: cover;
            cursor: zoom-in;
            transition: opacity 0.3s;
        }

        img.preview:hover {
            opacity: 0.85;
        }

        button { 
            padding: 12px 15px; 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        button:hover { background: var(--hover-color); }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        
        #status-container {
            margin-top: 25px;
            padding: 15px;
            border-radius: 6px;
            background: #f1f3f5;
            border-left: 5px solid var(--primary-color);
            text-align: left;
        }

        #status { font-weight: 500; color: #444; }

        .email-box {
            margin-top: 25px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            display: flex;
            gap: 12px;
            align-items: center;
            border: 1px solid #eee;
        }

        .email-box input {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        .email-box button {
            width: auto;
            white-space: nowrap;
            background: var(--success-color);
            padding: 12px 25px;
        }

        .email-box button:hover { background: var(--success-hover); }

        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0;
            width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            cursor: zoom-out;
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 95%;
            max-height: 95%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border: 3px solid white;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Patička upravena pro lepší čitelnost na spektrálním pozadí */
        .footer {
            margin-top: 30px;
            padding: 30px 20px;
            text-align: center;
            color: white;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5); /* Tmavší pozadí pro čitelnost */
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .footer img {
            height: 45px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-logos">
                <img src="https://www.czechglobe.cz/wp-content/themes/czechglobe/images/logo.png" alt="CzechGlobe Logo" onerror="this.style.display='none'">
                <img src="https://www.czechglobe.cz/media/cg-white-cs.png" alt="CzechGlobe White Logo" class="logo-white-inline">
            </div>
            <h1>Brno (ne)viditelné</h1>
        </div>
        
        <div class="grid">
            <div class="card">
                <h3>1. Viditelné světlo (RGB)</h3>
                <button onclick="takePhoto('rgb')" id="btn-rgb">Pořídit RGB</button>
                <img id="img-rgb" class="preview" src="/static/rgb.jpg" 
                     onerror="this.style.display='none'" onload="this.style.display='block'" 
                     onclick="openModal(this.src)" title="Klikněte pro plné rozlišení">
            </div>

            <div class="card">
                <h3>2. Infračervené světlo (NIR)</h3>
                <p class="filter-note">*Nasaďte filtr 720nm</p>
                <button onclick="takePhoto('nir')" id="btn-nir">Pořídit NIR</button>
                <img id="img-nir" class="preview" src="/static/nir.jpg" 
                     onerror="this.style.display='none'" onload="this.style.display='block'" 
                     onclick="openModal(this.src)" title="Klikněte pro plné rozlišení">
            </div>

            <div class="card">
                <h3>3. CIR Kompozit</h3>
                <button onclick="generateCIR()" id="btn-cir">Vytvořit CIR</button>
                <img id="img-cir" class="preview" src="/static/cir.jpg" 
                     onerror="this.style.display='none'" onload="this.style.display='block'" 
                     onclick="openModal(this.src)" title="Klikněte pro plné rozlišení">
            </div>
            
            <div class="card">
                <h3>4. Zdraví vegetace (NDVI)</h3>
                <button onclick="generateNDVI()" id="btn-ndvi">Vypočítat NDVI</button>
                <img id="img-ndvi" class="preview" src="/static/ndvi.jpg" 
                     onerror="this.style.display='none'" onload="this.style.display='block'" 
                     onclick="openModal(this.src)" title="Klikněte pro plné rozlišení">
            </div>
        </div>

        <div id="status-container">
            <div id="status">Připraven k měření.</div>
        </div>

        <div class="email-box">
            <input type="email" id="email-input" placeholder="Zadejte e-mailovou adresu pro export..." required>
            <button onclick="sendEmail()" id="btn-email">Odeslat výsledky</button>
        </div>
    </div>

    <div class="footer">
        <img src="https://www.czechglobe.cz/media/cg-white-cs.png" alt="CzechGlobe Footer Logo"><br>
        © 2026 CzechGlobe - Ústav výzkumu globální změny AV ČR, v. v. i.
    </div>

    <div id="image-modal" class="modal" onclick="closeModal()">
        <img class="modal-content" id="modal-img">
    </div>

    <script>
        function updateStatus(msg) {
            document.getElementById('status').innerText = msg;
        }

        function openModal(src) {
            document.getElementById("modal-img").src = src;
            document.getElementById("image-modal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("image-modal").style.display = "none";
        }

        async function takePhoto(type) {
            let btn = document.getElementById(`btn-${type}`);
            btn.disabled = true;
            updateStatus(`Pořizuji ${type.toUpperCase()} snímek...`);
            try {
                let response = await fetch(`/capture/${type}`, { method: 'POST' });
                let data = await response.json();
                if (response.ok) {
                    updateStatus(data.message);
                    document.getElementById(`img-${type}`).src = `/static/${type}.jpg?t=` + new Date().getTime();
                } else {
                    updateStatus(`Chyba: ${data.error}`);
                }
            } catch (err) { updateStatus("Chyba komunikace."); }
            btn.disabled = false;
        }

        async function generateCIR() {
            let btn = document.getElementById('btn-cir');
            btn.disabled = true;
            updateStatus("Generuji CIR kompozit...");
            try {
                let response = await fetch('/generate_cir', { method: 'POST' });
                let data = await response.json();
                if (response.ok) {
                    updateStatus(data.message);
                    document.getElementById('img-cir').src = '/static/cir.jpg?t=' + new Date().getTime();
                } else {
                    updateStatus(`Chyba: ${data.error}`);
                }
            } catch (err) { updateStatus("Chyba komunikace."); }
            btn.disabled = false;
        }

        async function generateNDVI() {
            let btn = document.getElementById('btn-ndvi');
            btn.disabled = true;
            updateStatus("Vypočítávám NDVI...");
            try {
                let response = await fetch('/generate_ndvi', { method: 'POST' });
                let data = await response.json();
                if (response.ok) {
                    updateStatus(data.message);
                    document.getElementById('img-ndvi').src = '/static/ndvi.jpg?t=' + new Date().getTime();
                } else {
                    updateStatus(`Chyba: ${data.error}`);
                }
            } catch (err) { updateStatus("Chyba komunikace."); }
            btn.disabled = false;
        }

        async function sendEmail() {
            let email = document.getElementById('email-input').value;
            if (!email || !email.includes('@')) {
                updateStatus("Zadejte platný e-mail.");
                return;
            }
            let btn = document.getElementById('btn-email');
            btn.disabled = true;
            updateStatus("Odesílám snímky...");
            try {
                let response = await fetch('/send_email', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: email })
                });
                let data = await response.json();
                if (response.ok) {
                    updateStatus(data.message);
                    document.getElementById('email-input').value = '';
                } else {
                    updateStatus(`Chyba: ${data.error}`);
                }
            } catch (err) { updateStatus("Chyba při odesílání."); }
            btn.disabled = false;
        }
    </script>
</body>
</html>
